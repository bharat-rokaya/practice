<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Movement Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111,#222,#111);
    font-family:Arial, Helvetica, sans-serif;
}

.main{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
}

h1{
    color:white;
    letter-spacing:3px;
}

.game{
    width:500px;
    height:400px;
    border:4px solid #00ffff;
    border-radius:15px;
    background:#1d1d1d;
    position:relative;
    overflow:hidden;
    box-shadow:0 0 30px cyan;
}

#ball{
    width:60px;
    height:60px;
    border-radius:50%;
    background:radial-gradient(circle,#ff7777,#ff0000);
    position:absolute;
    left:220px;
    top:170px;
    transition:.15s;
    box-shadow:
        0 0 10px red,
        0 0 25px red,
        0 0 45px crimson;
}

.controls{
    display:grid;
    grid-template-columns:repeat(3,70px);
    gap:10px;
}

button{
    height:55px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#222;
    color:#00ffff;
    transition:.2s;
    box-shadow:0 0 10px cyan;
}

button:hover{
    transform:scale(1.08);
    background:#00ffff;
    color:#111;
}

button:active{
    transform:scale(.95);
}

.empty{
    visibility:hidden;
}
</style>

</head>
<body>

<div class="main">

<h1>🎮 Move The Ball</h1>

<div class="game">
    <div id="ball"></div>
</div>

<div class="controls">
    <div class="empty"></div>
    <button id="up">⬆</button>
    <div class="empty"></div>

    <button id="left">⬅</button>
    <button id="down">⬇</button>
    <button id="right">➡</button>
</div>

</div>

<script>

const ball=document.getElementById("ball");
const game=document.querySelector(".game");

let x=220;
let y=170;

const speed=15;

function move(dx,dy){

    const maxX=game.clientWidth-ball.offsetWidth;
    const maxY=game.clientHeight-ball.offsetHeight;

    x+=dx;
    y+=dy;

    if(x<0) x=0;
    if(y<0) y=0;
    if(x>maxX) x=maxX;
    if(y>maxY) y=maxY;

    ball.style.left=x+"px";
    ball.style.top=y+"px";
}

up.onclick=()=>move(0,-speed);
down.onclick=()=>move(0,speed);
left.onclick=()=>move(-speed,0);
right.onclick=()=>move(speed,0);

document.addEventListener("keydown",(e)=>{

    switch(e.key){

        case "ArrowUp":
            move(0,-speed);
            break;

        case "ArrowDown":
            move(0,speed);
            break;

        case "ArrowLeft":
            move(-speed,0);
            break;

        case "ArrowRight":
            move(speed,0);
            break;
    }

});

</script>

</body>
</html>
