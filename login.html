<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show password</title>
    <style>
        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body {
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
            background:aliceblue
        }
        .login {
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
        }
        .inputbox {
            display:flex; 
            flex-direction:column;
            align-items:center;
            justify-content:center;
            width:300px;
            height:300px;
            background:linear-gradient(135deg,rgb(187, 215, 247),aliceblue);
            border:none;
            border-radius:20px;
        }
        #name, #password {
            width:80%;
            height:35px;
            font-size:14px;
            border: none;
            border-radius:10px;
            padding-left:10px;
            margin-top:10px;
        }

        #name:focus, #password:focus {
            outline:none;
            border:1px solid blue;;
        }
        #userError {
            border:none;
            color:red;
            width:75%;
            margin-top:-15px;
            margin-bottom:5px;
        }
        .show {
            transform:translate(105px,-23px);
        }
        .show img {
            width:20px;
            height:20px;
        }
        #btn {
            width:80%;
            height:30px;
            background-color:rgb(129, 181, 255);
            border:1px solid black;
            border-radius:10px;
            font-weight:500px;
            cursor:pointer;
        }
        a {
            text-decoration:none;
            color:blue;
            margin-top:10px;
        }
        #btn:hover {
            transform:scale(1.04);
            background-color:rgb(89, 154, 246);
        }
    </style>
</head>
<body>
    <div class="login">
        <div class="inputbox">
            <input type="text" id="name" placeholder="Enter your username" required><br>
            <input type="password" id="password" placeholder="Enter your password" required>
            <div class="show">
                <img class="img2" id="image" src="images/eyeoff.png">
            </div>
            <button id="btn">Login</button>
            <a href="create.html">New here? Create an account</a>
        </div>
    </div>

    <script>
        const inputPassword = document.getElementById("password");
        const showBtn = document.getElementById("image"); 
    
        showBtn.addEventListener("click",() => {
            if(inputPassword.type==="password") {
                inputPassword.type="text";
            } else {
                inputPassword.type="password";
            }
        })
    </script>
</body>
</html>
