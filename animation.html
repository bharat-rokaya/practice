<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        body {
            max-width: 1200px;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            height: 90vh;
            gap: 50px;
        }

        .box1 {
            background-color: black;
            color: white;
            width: 150px;
            height: 150px;
            text-align: center;
            align-content: center;
            animation: slide1 5s ease infinite, direction 10s ease infinite;
        }

        .box2 {
            background-color: rgb(193, 215, 235);
            color: black;
            width: 150px;
            height: 150px;
            text-align: center;
            align-content: center;
            animation: slide2 2s ease infinite;
        }

        @keyframes slide1 {
            0% {
                border-radius: 5%;
                opacity: 1;
            }
            25% {
                border-radius: 15%;
                opacity: 0.75;
            }
            50% {
                border-radius: 30%;
                opacity: 0.5;
            }
            75% {
                border-radius: 40px;
                opacity: 0.25;
            }
            100% {
                border-radius: 50%;
                opacity: 0;
            }
        }
        
        @keyframes direction {
            from{margin-right:0%;}
            to{margin-left:100%;}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">Box 1</div>
        <div class="box2">Box 2</div>
    </div>
</body>
</html>
